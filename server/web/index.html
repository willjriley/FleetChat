<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FleetChat</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1b1f24; --muted:#6b7480;
    --line:#e5e8ec; --accent:#3b6ea5; --chip:#eef1f5; --codebg:#f4f6f8;
    --t-str:#0a7d33; --t-com:#8a8f98; --t-num:#b5720a; --t-kw:#8250df;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0f1216; --panel:#171b21; --ink:#e8ebef; --muted:#8b95a1;
           --line:#252b33; --accent:#6ea8e0; --chip:#222831; --codebg:#12161c;
           --t-str:#7ee787; --t-com:#8b949e; --t-num:#f0b072; --t-kw:#d2a8ff; }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line)}
  header h1{font-size:17px;margin:0;letter-spacing:.3px}
  header .dot{width:9px;height:9px;border-radius:50%;background:#c0392b;transition:background .3s}
  header .dot.ok{background:#2e9e5b}
  header .conn{color:#c0392b;font-size:12px;margin-left:8px;opacity:.85}
  header .scope{margin-left:auto;font-size:12px;color:var(--muted)}
  header .ctl{margin-left:12px;font:inherit;font-size:12px;color:var(--ink);background:var(--chip);border:1px solid var(--line);border-radius:7px;padding:3px 11px;cursor:pointer}
  header .ctl:hover{border-color:#c0392b;color:#c0392b}
  main{flex:1;display:flex;min-height:0}
  .side{width:250px;border-right:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:12px}
  .side h2{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:4px 4px 10px}
  .agent{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px}
  .agent .av{width:22px;height:22px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:700}
  .agent .nm{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .agent .ct{margin-left:auto;font-size:11px;color:var(--muted)}
  /* animated … next to a name while that agent is composing a reply (mid claude call) */
  .agent .nmwrap{flex:1;min-width:0;display:flex;align-items:center;gap:5px;overflow:hidden}
  .agent .dots{display:none;color:var(--accent);font-weight:700;letter-spacing:2px;line-height:1;flex:none}
  .agent .dots.on{display:inline-block}
  .agent .dots i{font-style:normal;opacity:.2;animation:tdot 1.15s infinite}
  .agent .dots i:nth-child(2){animation-delay:.19s}
  .agent .dots i:nth-child(3){animation-delay:.38s}
  @keyframes tdot{0%,70%,100%{opacity:.2}35%{opacity:1}}
  .agent .spk{display:none;flex:none;font-size:12px;line-height:1;animation:spulse 1.1s infinite}
  .agent .spk.on{display:inline-block}
  @keyframes spulse{0%,100%{opacity:.35;transform:scale(.92)}50%{opacity:1;transform:scale(1.12)}}
  .agent .kick{margin-left:6px;border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;padding:0 3px;border-radius:4px}
  .agent .kick:hover{color:#c0392b;background:var(--chip)}
  /* per-agent memory toggle: dim+grey = -p (stateless, the default); lit = long-term memory on */
  .agent .book{margin-left:6px;border:0;background:transparent;cursor:pointer;font-size:13px;line-height:1;padding:0 3px;border-radius:4px;opacity:.3;filter:grayscale(1)}
  .agent .book:hover{background:var(--chip);opacity:.65}
  .agent .book.on{opacity:1;filter:none}
  .addbtn{margin:12px 4px 0;width:calc(100% - 8px);font:inherit;font-size:12px;color:var(--accent);background:transparent;border:1px dashed var(--line);border-radius:8px;padding:7px;cursor:pointer}
  .addbtn:hover{border-color:var(--accent);background:var(--chip)}
  .feed{flex:1;display:flex;flex-direction:column;min-width:0}
  .msgs{flex:1;overflow-y:auto;padding:18px}
  .msg{max-width:820px;margin:0 auto 14px;display:flex;gap:11px}
  .msg .av{width:30px;height:30px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:700}
  .msg .body{flex:1;min-width:0}
  .msg .top{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
  .msg .who{font-weight:600}
  .msg .when{font-size:11px;color:var(--muted)}
  .msg .tags{margin-top:5px;display:flex;flex-wrap:wrap;gap:5px}
  .tag{font-size:11px;color:var(--muted);background:var(--chip);border-radius:20px;padding:1px 9px}
  /* rich content */
  .md{word-wrap:break-word;overflow-wrap:anywhere}
  .md p{margin:2px 0}
  .md h2{font-size:18px;margin:9px 0 4px} .md h3{font-size:16px;margin:8px 0 3px} .md h4{font-size:14px;margin:7px 0 3px}
  .md ul,.md ol{margin:4px 0;padding-left:22px} .md li{margin:1px 0}
  .md a{color:var(--accent);text-decoration:none} .md a:hover{text-decoration:underline}
  code.inline{background:var(--chip);border-radius:4px;padding:1px 5px;font:12.5px ui-monospace,Consolas,monospace}
  /* @-mention chips inside message text + a "you were tagged" row highlight. Chip tint reuses the
     same per-name hue() the avatars use (passed in as --mc-h); @all + the row accent use --accent. */
  .mchip{display:inline;padding:0 5px;border-radius:6px;font-weight:600;white-space:nowrap;background:hsla(var(--mc-h,210),65%,45%,.16);color:hsl(var(--mc-h,210),58%,38%)}
  @media (prefers-color-scheme:dark){ .mchip{background:hsla(var(--mc-h,210),60%,58%,.22);color:hsl(var(--mc-h,210),80%,74%)} }
  /* A FORCED theme (the settings picker's data-theme) must override the OS media query above --
     source order wins at equal specificity. Dark-family themes get the dark chip variant, light-
     family the light one. A new palette added later needs one selector added to the right list. */
  html[data-theme="dark"] .mchip, html[data-theme="dusk"] .mchip, html[data-theme="harbor"] .mchip{
    background:hsla(var(--mc-h,210),60%,58%,.22);color:hsl(var(--mc-h,210),80%,74%)}
  html[data-theme="light"] .mchip, html[data-theme="sepia"] .mchip{
    background:hsla(var(--mc-h,210),65%,45%,.16);color:hsl(var(--mc-h,210),58%,38%)}
  .mchip-all{background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent);font-weight:700}
  .msg.tagged{background:color-mix(in srgb,var(--accent) 10%,transparent);border-left:3px solid var(--accent);border-radius:8px;padding:8px 12px}
  .code{position:relative;margin:8px 0;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--codebg)}
  .code .lang{position:absolute;top:0;right:0;font-size:10px;color:var(--muted);background:var(--chip);padding:1px 7px;border-radius:0 0 0 6px;text-transform:uppercase;letter-spacing:.5px}
  .code pre{margin:0;overflow-x:auto;padding:8px 0;font:12.5px/1.55 ui-monospace,Consolas,monospace}
  .cl{display:flex;padding:0 12px}
  .cl .ln{flex:none;width:2.2em;text-align:right;margin-right:12px;color:var(--muted);opacity:.55;user-select:none}
  .cl .lc{white-space:pre}
  .s-str{color:var(--t-str)} .s-com{color:var(--t-com);font-style:italic} .s-num{color:var(--t-num)} .s-kw{color:var(--t-kw);font-weight:600}
  .poll{margin:8px 0;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--panel)}
  .poll-q{font-weight:600;margin-bottom:8px}
  .poll-opt{position:relative;display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:7px;padding:7px 10px;margin:5px 0;cursor:pointer;overflow:hidden;font:inherit}
  .poll-opt .bar{position:absolute;left:0;top:0;bottom:0;width:0;background:color-mix(in srgb,var(--accent) 22%,transparent);transition:width .35s;z-index:0}
  .poll-opt .opt-label{position:relative;z-index:1}
  .poll-opt .opt-count{position:relative;z-index:1;float:right;color:var(--muted);font-size:12px}
  .poll-foot{font-size:11px;color:var(--muted);margin-top:6px}
  form{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--line);background:var(--panel);position:relative}
  .mention{position:absolute;z-index:30;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 26px rgba(0,0,0,.16);padding:4px;max-height:220px;overflow-y:auto;min-width:180px}
  .mention .mi{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:7px;cursor:pointer;font-size:13px;white-space:nowrap}
  .mention .mi.sel{background:var(--chip)}
  .mention .mi .av{width:20px;height:20px;font-size:10px}
  .mention .mi .mrole{color:var(--muted);font-size:11px;margin-left:auto;padding-left:10px}
  .mention .mi.allrow .mrole{color:var(--accent);font-weight:600}
  /* target chips: who this message is addressed to (parsed live from the @mentions) */
  .tags{display:none;flex-wrap:wrap;gap:6px;padding:8px 18px 0}
  .tags .tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;background:var(--chip);color:var(--ink);border:1px solid var(--line);border-radius:999px;padding:3px 5px 3px 10px}
  .tags .tag.all{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tags .tag .tagx{font:inherit;font-size:15px;line-height:1;border:0;background:transparent;color:inherit;cursor:pointer;opacity:.65;padding:0 4px}
  .tags .tag .tagx:hover{opacity:1}
  input,textarea{font:inherit;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px}
  #who{width:120px}
  #text{flex:1;resize:none;height:40px}
  button.send{font:inherit;font-weight:600;color:#fff;background:var(--accent);border:0;border-radius:9px;padding:0 18px;cursor:pointer}
  button.send:disabled{opacity:.5;cursor:default}
  .empty{color:var(--muted);text-align:center;margin-top:40px}

  /* ============================================================
     ADDED: theme palettes + settings modal + restrained chat polish.
     Self-contained block, appended at the end of the stylesheet so it
     doesn't collide with concurrent rendering-CSS edits above.
     ============================================================ */

  /* --- Theme palettes. A data-theme attribute on <html> overrides the
         :root vars. "System" = no attribute -> falls back to the media
         query above. Each palette (re)defines EVERY themable var. --- */
  html[data-theme="light"]{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1b1f24; --muted:#6b7480;
    --line:#e5e8ec; --accent:#3b6ea5; --chip:#eef1f5; --codebg:#f4f6f8;
    --t-str:#0a7d33; --t-com:#8a8f98; --t-num:#b5720a; --t-kw:#8250df;
  }
  html[data-theme="dark"]{
    --bg:#0f1216; --panel:#171b21; --ink:#e8ebef; --muted:#8b95a1;
    --line:#252b33; --accent:#6ea8e0; --chip:#222831; --codebg:#12161c;
    --t-str:#7ee787; --t-com:#8b949e; --t-num:#f0b072; --t-kw:#d2a8ff;
  }
  html[data-theme="dusk"]{   /* soft indigo twilight -- warm, dark-ish */
    --bg:#191725; --panel:#221f31; --ink:#e8e5f2; --muted:#9992b0;
    --line:#332f45; --accent:#9a84e0; --chip:#2b2740; --codebg:#151320;
    --t-str:#8fd8a0; --t-com:#867e9e; --t-num:#eeb079; --t-kw:#c6a6ff;
  }
  html[data-theme="sepia"]{  /* warm paper reading mode -- light-ish */
    --bg:#f2e8d5; --panel:#faf3e4; --ink:#3a3026; --muted:#8a7a63;
    --line:#e0d3ba; --accent:#9c6b3f; --chip:#eaddc7; --codebg:#efe5d2;
    --t-str:#5c7a2f; --t-com:#a08b6f; --t-num:#a5642a; --t-kw:#8a5a86;
  }
  html[data-theme="harbor"]{ /* cool slate + teal */
    --bg:#0e1a1f; --panel:#152329; --ink:#dfeaed; --muted:#8098a0;
    --line:#213139; --accent:#2f9d92; --chip:#1b2c33; --codebg:#0c161a;
    --t-str:#6fd6b0; --t-com:#7d939b; --t-num:#e0b57a; --t-kw:#79b8e0;
  }

  /* --- Restrained chat polish (CSS only; no layout/class changes) --- */
  body{transition:background-color .25s ease, color .25s ease}
  header, .side, form, input, textarea, .modal{transition:background-color .25s ease, color .25s ease, border-color .25s ease}
  .msg{padding:6px 10px; border-radius:10px; transition:background-color .15s ease}
  .msg:hover{background-color:color-mix(in srgb, var(--accent) 7%, transparent)}
  /* faint scroll-edge shadows on the feed (reveal only when it overflows) */
  .msgs{
    background:
      linear-gradient(var(--bg) 30%, rgba(0,0,0,0)) 0 0 / 100% 22px no-repeat local,
      linear-gradient(rgba(0,0,0,0), var(--bg) 70%) 0 100% / 100% 22px no-repeat local,
      radial-gradient(farthest-side at 50% 0, rgba(0,0,0,.14), rgba(0,0,0,0)) 0 0 / 100% 9px no-repeat scroll,
      radial-gradient(farthest-side at 50% 100%, rgba(0,0,0,.14), rgba(0,0,0,0)) 0 100% / 100% 9px no-repeat scroll;
  }
  input:focus, textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent)}
  button.send:focus-visible, .ctl:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  /* --- Settings modal --- */
  .modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; opacity:0; transition:opacity .18s ease}
  .modal-backdrop.show{opacity:1}
  .modal{background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:14px; box-shadow:0 18px 60px rgba(0,0,0,.35); width:100%; max-width:520px; max-height:85vh; overflow-y:auto; transform:translateY(8px); transition:transform .18s ease}
  .modal-backdrop.show .modal{transform:none}
  .modal-head{display:flex; align-items:center; gap:10px; padding:15px 18px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--panel); z-index:1}
  .modal-head h2{margin:0; font-size:16px; font-weight:600; letter-spacing:.2px}
  .modal-head .x{margin-left:auto; border:0; background:transparent; color:var(--muted); font-size:22px; line-height:1; cursor:pointer; padding:2px 8px; border-radius:7px}
  .modal-head .x:hover{background:var(--chip); color:var(--ink)}
  .modal-body{padding:6px 18px 20px}
  .set-sec{margin-top:18px}
  .set-sec h3{font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin:0 0 8px}
  .set-row{display:flex; align-items:baseline; gap:12px; padding:6px 0; border-bottom:1px solid var(--line); font-size:13px}
  .set-row:last-child{border-bottom:0}
  .set-row .k{color:var(--muted); flex:none; min-width:120px}
  .set-row .v{color:var(--ink); word-break:break-word}
  .set-crew{display:flex; align-items:center; gap:9px; padding:7px 0; border-bottom:1px solid var(--line)}
  .set-crew:last-child{border-bottom:0}
  .set-crew .nm{font-weight:600; font-size:13px; flex:none}
  .set-crew .rl{color:var(--muted); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .set-badge{font-size:11px; border-radius:20px; padding:1px 10px; background:var(--chip); color:var(--muted); flex:none}
  .set-crew .set-badge{margin-left:auto}
  .set-badge.on{background:color-mix(in srgb, var(--accent) 22%, transparent); color:var(--ink)}
  .set-note{margin-top:16px; font-size:12px; color:var(--muted); font-style:italic}
  /* Appearance: theme swatch buttons (bg preview + accent dot) */
  .theme-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(90px, 1fr)); gap:9px}
  .theme-sw{border:1px solid var(--line); border-radius:11px; padding:8px; cursor:pointer; background:var(--panel); color:var(--ink); text-align:left; font:inherit; font-size:12px; display:flex; flex-direction:column; gap:7px; transition:border-color .15s ease, box-shadow .15s ease}
  .theme-sw:hover{border-color:var(--accent)}
  .theme-sw.sel{border-color:var(--accent); box-shadow:0 0 0 2px color-mix(in srgb, var(--accent) 30%, transparent)}
  .theme-sw .sw-prev{height:32px; border-radius:7px; border:1px solid rgba(127,127,127,.28); display:flex; align-items:flex-end; justify-content:flex-end; padding:5px}
  .theme-sw .sw-dot{width:13px; height:13px; border-radius:50%; box-shadow:0 0 0 1px rgba(255,255,255,.4)}
  .theme-sw .sw-name{font-weight:600}
  /* operator-command result panels (client-only /find, /status, /voices ...) + the /find match jump */
  .msg.localnote .who{color:var(--accent)}
  .md mark{background:color-mix(in srgb,var(--accent) 32%,transparent);color:inherit;border-radius:3px;padding:0 2px}
  .md table{border-collapse:collapse;margin:6px 0;font-size:13px;display:block;overflow-x:auto}
  .md th,.md td{border:1px solid var(--line);padding:3px 10px;text-align:left;white-space:nowrap}
  .md th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .md ul.findhits{list-style:none;padding-left:0;margin:4px 0}
  .md ul.findhits li{margin:3px 0}
  .md ul.findhits a{color:var(--accent);text-decoration:none;font-weight:600}
  .md ul.findhits a:hover{text-decoration:underline}
  .msg.flash{animation:flashmsg 1.2s ease-out}
  @keyframes flashmsg{0%{background:color-mix(in srgb,var(--accent) 20%,transparent)}100%{background:transparent}}
  /* ---------- task board (kanban): the thread-ledger's face ---------- */
  .kanban{width:300px;border-left:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:10px;display:none}
  .kanban.on{display:block}
  .kanban h2{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:4px 4px 8px}
  .lane{margin-bottom:14px}
  .lane .lt{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 2px 6px;display:flex;align-items:center;gap:6px}
  .lane .lt .n{background:var(--chip);border-radius:10px;padding:0 7px;font-weight:600}
  .card{border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin:6px 0;background:var(--bg);position:relative}
  .card.claimed{border-left:3px solid var(--accent)}
  .card.stale{border-left:3px solid #d68910;animation:cardamber 1.6s infinite}
  .card.done{opacity:.62}
  @keyframes cardamber{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 2px rgba(214,137,16,.25)}}
  .card .ct{font-size:13px;line-height:1.35;word-wrap:break-word}
  .card .cmeta{display:flex;align-items:center;gap:5px;margin-top:6px}
  .card .cmeta .av{width:18px;height:18px;font-size:9px}
  .card .cage{margin-left:auto;font-size:10.5px;color:var(--muted)}
  .card .cbtns{display:flex;gap:5px;margin-top:7px}
  .card .cbtns button{font:inherit;font-size:11px;color:var(--ink);background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:2px 8px;cursor:pointer}
  .card .cbtns button:hover{border-color:var(--accent);color:var(--accent)}
  .card .csum{font-size:11.5px;color:var(--muted);margin-top:5px;font-style:italic}
  .kadd{width:calc(100% - 4px);margin:2px;font:inherit;font-size:12px;color:var(--accent);background:transparent;border:1px dashed var(--line);border-radius:8px;padding:6px;cursor:pointer}
  .kadd:hover{border-color:var(--accent);background:var(--chip)}
  .kempty{font-size:11.5px;color:var(--muted);margin:2px 4px}
</style>
<script>
  // Apply the saved theme before first paint so there's no flash of the default palette.
  try{ var _ft=localStorage.getItem("fleetchat_theme"); if(_ft && _ft!=="system") document.documentElement.setAttribute("data-theme", _ft); }catch(_e){}
</script>
</head>
<body>
<header>
  <span class="dot" id="dot"></span>
  <h1>FleetChat</h1>
  <span class="conn" id="conn"></span>
  <span class="scope" id="scope"></span>
  <button id="tasksbtn" class="ctl" title="Open the full task board (new tab)">📋 Tasks</button>
  <button id="minibtn" class="ctl" title="Quick-glance task panel">▤</button>
  <button id="mute" class="ctl" title="Agent voices on/off">🔊</button>
  <button id="settings" class="ctl" title="Settings">⚙</button>
  <button id="shutdown" class="ctl" style="display:none" title="Stop the server and the whole crew">Shut down</button>
</header>
<main>
  <aside class="side">
    <h2>On the board</h2>
    <div id="agents"></div>
    <button id="addagent" class="addbtn" style="display:none">+ Add agent</button>
  </aside>
  <section class="feed">
    <div class="msgs" id="msgs"><div class="empty">No agents yet — click <b>+ Add agent</b> in the sidebar and point it at a project folder to add your first one.</div></div>
    <div id="tags" class="tags" title="Who this message goes to — type @ to add, or click × to remove"></div>
    <form id="form">
      <input id="who" placeholder="your name" autocomplete="off">
      <textarea id="text" placeholder="Message the crew…   markdown &amp; `code` render · type / for commands"></textarea>
      <button class="send" id="send" type="submit">Send</button>
    </form>
  </section>
  <aside class="kanban" id="kanban">
    <h2>Task board</h2>
    <button class="kadd" id="kadd">+ New task</button>
    <div id="lanes"></div>
  </aside>
</main>
<script>
(function(){
  var lastId = 0, token = localStorage.getItem("fleetchat_token") || "";
  var counts = {}, seen = {}, allMsgs = [], controlOn = false, agentNames = {}, memoryState = {}, rosterMap = {}, typingSet = {}, rosterList = [], serverTts = false, serverSeen = 0, ttsKnown = false, speakingSet = {};
  var $ = function(s){ return document.querySelector(s); };
  var msgs = $("#msgs"), agents = $("#agents"), dot = $("#dot"), scope = $("#scope");

  function hue(s){ var h=0; for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))%360; return h; }
  function av(s){ var d=document.createElement("div"); d.className="av";
    d.style.background="hsl("+hue(s)+" 55% 45%)"; d.textContent=(s[0]||"?").toUpperCase(); return d; }
  function when(ts){ return new Date(ts*1000).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}); }
  function headers(extra){ var h=Object.assign({}, extra||{}); if(token) h["X-Fleet-Token"]=token; return h; }

  // ---------- agent voices: the browser's own speech synthesis (zero dependency) ----------
  var muted = localStorage.getItem("fleetchat_muted")==="1";
  var speakReady = false, voices = [];
  function loadVoices(){ try{ voices=(window.speechSynthesis && speechSynthesis.getVoices())||[]; }catch(e){} }
  if(window.speechSynthesis){ loadVoices(); try{ speechSynthesis.onvoiceschanged=loadVoices; }catch(e){} }
  // OPTIONAL, EXAMPLE per-agent voice assignment. Each name maps to an ordered list of preferred
  // browser voices (case-insensitive substring match against installed voices); the first present
  // one wins, else a stable name-hash pick, so it always works. These are BROWSER voices (Web Speech
  // API) -- a self-contained fallback. If you run a server-side TTS speaker instead, the page detects
  // it (see loadTtsState) and the browser voices stand down automatically. Edit for your own agents.
  var VOICE_MAP = {
    lodestar: ["david","guy","us english"],
    aegis:    ["mark","eric","christopher"],
    muse:     ["zira","aria","jenny","female"],
    keystone: ["george","ryan","uk english male"],
    lumen:    ["roger","steffan","daniel"]
  };
  function voiceFor(name){
    if(!voices.length) loadVoices();
    if(!voices.length) return null;
    var prefs=VOICE_MAP[(name||"").toLowerCase()];
    if(prefs){
      for(var p=0;p<prefs.length;p++){
        for(var i=0;i<voices.length;i++){
          if((voices[i].name||"").toLowerCase().indexOf(prefs[p])>=0) return voices[i];
        }
      }
    }
    var h=0; for(var j=0;j<name.length;j++) h=(h*31+name.charCodeAt(j))%voices.length;
    return voices[h];
  }
  function cleanForSpeech(t){
    return (t||"").replace(/```[\s\S]*?```/g," , code, ").replace(/`([^`]+)`/g,"$1")
      .replace(/\[([^\]]+)\]\([^)]+\)/g,"$1").replace(/https?:\/\/\S+/g," link ")
      .replace(/[*#_>|]/g,"").replace(/\s+/g," ").trim().slice(0,400);
  }
  function speak(sender, text){
    // Browser TTS is the FALLBACK: it stays silent until the server state is KNOWN (no boot race),
    // and for 45s after the server speaker was last seen -- so a heartbeat missed mid-playback can
    // never flip a stray robo-voice in while the server is still working a queue.
    if(muted || !ttsKnown || serverTts || (Date.now()-serverSeen)<45000 || !speakReady || !window.speechSynthesis) return;
    var say=cleanForSpeech(text); if(!say) return;
    var u=new SpeechSynthesisUtterance(say); var v=voiceFor(sender); if(v) u.voice=v; u.rate=1.05;
    try{ speechSynthesis.speak(u); }catch(e){}
  }
  function setMuted(m){
    muted=m; localStorage.setItem("fleetchat_muted", m?"1":"0");
    var b=$("#mute"); if(b) b.textContent = m ? "🔇" : "🔊";
    if(m && window.speechSynthesis){ try{ speechSynthesis.cancel(); }catch(e){} }
    // also gate any server-side TTS speaker -> the mute button controls the real voices, not just the browser
    fetch("/control/tts",{method:"POST",headers:headers({"Content-Type":"application/json"}),body:JSON.stringify({muted:m})}).catch(function(){});
  }
  (function(){ var b=$("#mute"); if(!b) return; if(!window.speechSynthesis){ b.style.display="none"; return; } b.textContent = muted ? "🔇" : "🔊"; b.addEventListener("click", function(){ setMuted(!muted); }); })();

  // Browsers stay silent until the first user gesture (anti-autoplay). Prime the speech
  // engine on the first click/keypress so agent voices work the moment the user engages.
  (function(){
    if(!window.speechSynthesis) return;
    function prime(){
      document.removeEventListener("pointerdown", prime); document.removeEventListener("keydown", prime);
      try{ var u=new SpeechSynthesisUtterance(" "); u.volume=0; speechSynthesis.speak(u); }catch(e){}
    }
    document.addEventListener("pointerdown", prime); document.addEventListener("keydown", prime);
  })();

  // ---------- safe rich rendering (escape FIRST, then formatting) ----------
  function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

  function highlight(escLine){   // light, language-agnostic token coloring on already-escaped text
    return escLine
      .replace(/(&quot;.*?&quot;|&#39;.*?&#39;)/g,'<span class="s-str">$1</span>')
      .replace(/(#.*|\/\/.*)/g,'<span class="s-com">$1</span>')
      .replace(/\b(\d+(?:\.\d+)?)\b/g,'<span class="s-num">$1</span>')
      .replace(/\b(def|class|function|return|if|else|elif|for|while|import|from|export|const|let|var|new|try|except|catch|finally|await|async|true|false|null|None|True|False)\b/g,'<span class="s-kw">$1</span>');
  }
  function renderCode(code, lang){
    var lines = code.replace(/\n$/,"").split("\n");
    var body = lines.map(function(l,i){
      return '<div class="cl"><span class="ln">'+(i+1)+'</span><span class="lc">'+highlight(esc(l))+'</span></div>';
    }).join("");
    return '<div class="code">'+(lang?'<span class="lang">'+esc(lang)+'</span>':'')+'<pre>'+body+'</pre></div>';
  }
  function mdInline(t){   // t is ALREADY escaped
    t = t.replace(/`([^`]+)`/g,'<code class="inline">$1</code>');
    t = t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    t = t.replace(/\*([^*\s][^*]*?)\*/g,'<em>$1</em>');
    t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    t = t.replace(/(^|[\s(>])((?:https?:\/\/)[^\s<)]+)/g,'$1<a href="$2" target="_blank" rel="noopener noreferrer">$2</a>');
    return t;
  }
  function renderMarkdown(src){
    var blocks=[];
    src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, function(m,lang,code){ blocks.push(renderCode(code,lang)); return "CB"+(blocks.length-1)+""; });
    var lines = src.split("\n"), out=[], i=0;
    while(i<lines.length){
      var ln=lines[i];
      if(/^CB\d+\s*$/.test(ln.trim())){ out.push(ln.trim()); i++; continue; }
      var h=ln.match(/^(#{1,3})\s+(.*)$/);
      if(h){ var lvl=h[1].length+1; out.push("<h"+lvl+">"+mdInline(esc(h[2]))+"</h"+lvl+">"); i++; continue; }
      if(/^[-*]\s+/.test(ln)){ var it=[]; while(i<lines.length&&/^[-*]\s+/.test(lines[i])){ it.push("<li>"+mdInline(esc(lines[i].replace(/^[-*]\s+/,"")))+"</li>"); i++; } out.push("<ul>"+it.join("")+"</ul>"); continue; }
      if(/^\d+\.\s+/.test(ln)){ var it2=[]; while(i<lines.length&&/^\d+\.\s+/.test(lines[i])){ it2.push("<li>"+mdInline(esc(lines[i].replace(/^\d+\.\s+/,"")))+"</li>"); i++; } out.push("<ol>"+it2.join("")+"</ol>"); continue; }
      if(ln.trim()===""){ i++; continue; }
      out.push("<p>"+mdInline(esc(ln))+"</p>"); i++;
    }
    return out.join("").replace(/CB(\d+)/g, function(m,x){ return blocks[x]; });
  }

  // ---------- polls (votes are just board messages: /vote <pollId> <idx>) ----------
  function parsePoll(text){
    if(!/^\/poll\s+/.test(text)) return null;
    var lines=text.split("\n");
    var q=lines[0].replace(/^\/poll\s+/,"").trim();
    var opts=lines.slice(1).filter(function(l){return /^[-*]\s+/.test(l);}).map(function(l){return l.replace(/^[-*]\s+/,"").trim();});
    return opts.length ? {q:q, opts:opts} : null;
  }
  function tally(pollId, nOpts){
    var votes={}, counts=[], total=0, k;
    for(k=0;k<nOpts;k++) counts.push(0);
    allMsgs.forEach(function(m){
      var v=(m.text||"").match(/^\/vote\s+(\d+)\s+(\d+)/);
      if(v && +v[1]===pollId) votes[m.sender]=+v[2];
    });
    Object.keys(votes).forEach(function(s){ var idx=votes[s]; if(idx>=0&&idx<nOpts){ counts[idx]++; total++; } });
    return {counts:counts, total:total};
  }
  function renderPoll(msg){
    var p=parsePoll(msg.text); if(!p) return null;
    var el=document.createElement("div"); el.className="poll"; el.dataset.pollId=msg.id; el.dataset.n=p.opts.length;
    var q=document.createElement("div"); q.className="poll-q"; q.textContent=p.q; el.appendChild(q);
    p.opts.forEach(function(opt,idx){
      var b=document.createElement("button"); b.className="poll-opt"; b.dataset.idx=idx; b.type="button";
      var bar=document.createElement("span"); bar.className="bar";
      var lab=document.createElement("span"); lab.className="opt-label"; lab.textContent=opt;
      var cnt=document.createElement("span"); cnt.className="opt-count";
      b.appendChild(bar); b.appendChild(lab); b.appendChild(cnt);
      b.addEventListener("click", function(){ vote(msg.id, idx); });
      el.appendChild(b);
    });
    var foot=document.createElement("div"); foot.className="poll-foot"; el.appendChild(foot);
    return el;
  }
  function updatePoll(el){
    var pollId=+el.dataset.pollId, n=+el.dataset.n, t=tally(pollId, n);
    el.querySelectorAll(".poll-opt").forEach(function(row){
      var idx=+row.dataset.idx, c=t.counts[idx], pct=t.total?Math.round(c/t.total*100):0;
      row.querySelector(".bar").style.width=pct+"%";
      row.querySelector(".opt-count").textContent=c+" ("+pct+"%)";
    });
    el.querySelector(".poll-foot").textContent=t.total+" vote"+(t.total===1?"":"s")+" · click to vote (re-click to change)";
  }
  function updateAllPolls(){ document.querySelectorAll(".poll").forEach(updatePoll); }
  function vote(pollId, idx){
    fetch("/post",{method:"POST",headers:headers({"Content-Type":"application/json"}),
      body:JSON.stringify({sender:($("#who").value||"you").trim(), text:"/vote "+pollId+" "+idx, tags:["vote"]})})
      .then(function(r){ if(r.status===401){ askToken(); } else { poll(); } });
  }

  function renderAgents(){
    // The sidebar renders the CONFIGURED ROSTER (data/roster.json via /roster), not "who posted".
    // Every agent is equal: same row, a memory toggle + a remove (x) for all, no forced lead-star.
    agents.innerHTML="";
    rosterList.forEach(function(a){
      var name=a.id;
      var row=document.createElement("div"); row.className="agent";
      row.appendChild(av(name));
      var nm=document.createElement("span"); nm.className="nm"; nm.textContent=a.name||name;
      row.title=a.role||"";
      var dots=document.createElement("span"); dots.className="dots"+(typingSet[name]?" on":""); dots.innerHTML="<i>&#8226;</i><i>&#8226;</i><i>&#8226;</i>"; dots.title="working on a reply";
      var spk=document.createElement("span"); spk.className="spk"+(speakingSet[name]?" on":""); spk.textContent="🔊"; spk.title="speaking now";
      var nmwrap=document.createElement("span"); nmwrap.className="nmwrap"; nmwrap.appendChild(nm); nmwrap.appendChild(dots); nmwrap.appendChild(spk);
      row.appendChild(nmwrap);
      if(controlOn){
        var on=!!memoryState[name];
        var bk=document.createElement("button"); bk.className="book"+(on?" on":""); bk.textContent="📖";
        bk.title=on ? (name+": long-term memory ON — carries its plan + progress across turns. Click for stateless -p.")
                    : (name+": -p (stateless, the default) — fresh brain each message, no memory. Click for long-term memory: best when it's building something over several turns.");
        (function(n){ bk.addEventListener("click", function(){ toggleMemory(n); }); })(name);
        row.appendChild(bk);
        var x=document.createElement("button"); x.className="kick"; x.textContent="×"; x.title="Remove "+name;
        (function(n){ x.addEventListener("click", function(){ kickAgent(n); }); })(name);
        row.appendChild(x);
      }
      agents.appendChild(row);
    });
  }
  function kickAgent(name){
    if(!confirm("Remove "+name+" from the crew?")) return;
    fetch("/control/kick",{method:"POST",headers:headers({"Content-Type":"application/json"}),
      body:JSON.stringify({agent:name})})
      .then(function(r){ if(r.status===401){askToken();} else { delete agentNames[name]; poll(); } });
  }
  function loadRoster(){
    // the who's-who: each agent's lane, shown as a hover title (no lead/star -- all agents equal)
    fetch("/roster",{headers:headers()}).then(function(r){ return r.status===200?r.json():null; })
      .then(function(j){ if(j&&j.roster){ rosterList=j.roster; rosterMap={}; j.roster.forEach(function(a){ rosterMap[a.id]=a; }); renderAgents(); } })
      .catch(function(){});
  }
  function loadTyping(){
    // who is mid-thought right now -> the animated … next to the name. Re-render only on a
    // change, so a running animation isn't reset by every poll.
    fetch("/typing",{headers:headers()}).then(function(r){ return r.status===200?r.json():null; })
      .then(function(j){ if(!j) return;
        var s={}; (j.typing||[]).forEach(function(n){ s[n]=1; });
        var sp={}; (j.speaking||[]).forEach(function(n){ sp[n]=1; });
        var changed=Object.keys(s).sort().join(",")!==Object.keys(typingSet).sort().join(",") ||
                    Object.keys(sp).sort().join(",")!==Object.keys(speakingSet).sort().join(",");
        typingSet=s; speakingSet=sp; if(changed) renderAgents(); })
      .catch(function(){});
  }
  function loadTtsState(){
    // if a server-side speaker is live, the browser TTS stands down (no double up)
    fetch("/control/tts",{headers:headers()}).then(function(r){ return r.status===200?r.json():null; })
      .then(function(j){ if(j){ ttsKnown=true; serverTts=!!j.server; if(serverTts) serverSeen=Date.now(); } }).catch(function(){});
  }
  function loadMemory(){
    // fetch the current per-agent memory flags so the book icons render lit/dim correctly
    if(!controlOn) return;
    fetch("/control/memory",{headers:headers()})
      .then(function(r){ return r.status===200 ? r.json() : null; })
      .then(function(j){ if(j && j.memory){ memoryState=j.memory; renderAgents(); } })
      .catch(function(){});
  }
  function toggleMemory(name){
    // flip -p <-> long-term memory for one agent; the server writes it to the git-ignored
    // data/settings.json, and each agent re-reads that fresh on its next message (no restart). Optimistic UI.
    var on=!memoryState[name];
    memoryState[name]=on; renderAgents();
    fetch("/control/memory",{method:"POST",headers:headers({"Content-Type":"application/json"}),
      body:JSON.stringify({agent:name, on:on})})
      .then(function(r){
        if(r.status===401){ askToken(); throw null; }
        return r.json().then(function(j){ return {s:r.status, j:j}; });
      })
      .then(function(res){
        if(res.s>=400){ throw res.j; }
        if(res.j && res.j.memory){ memoryState=res.j.memory; renderAgents(); }
      })
      .catch(function(e){ memoryState[name]=!on; renderAgents();   // revert on failure
        if(e && e.error){ alert("Couldn't toggle memory: "+e.error); } });
  }
  function addAgent(){
    // native folder picker first (a real OS dialog on this machine); typed-path fallback
    fetch("/control/pick",{method:"POST",headers:headers()})
      .then(function(r){ return r.json().then(function(j){ return {s:r.status,j:j}; }); })
      .then(function(res){
        if(res.s===401){ askToken(); return; }
        if(res.s===200 && res.j.folder){ doAdd(res.j.folder); return; }
        if(res.j && res.j.error==="cancelled"){ return; }
        var f=prompt("Paste the project folder path for the new agent (its name becomes the agent name):");
        if(f) doAdd(f.trim());
      })
      .catch(function(){ var f=prompt("Paste the project folder path for the new agent:"); if(f) doAdd(f.trim()); });
  }
  function doAdd(folder){
    fetch("/control/add",{method:"POST",headers:headers({"Content-Type":"application/json"}),
      body:JSON.stringify({folder:folder})})
      .then(function(r){ return r.json().then(function(j){ return {s:r.status,j:j}; }); })
      .then(function(res){
        if(res.s===401){ askToken(); }
        else if(res.s>=400){ alert("Couldn't add agent: "+(res.j.error||res.s)); }
        else { poll(); }
      }).catch(function(){ alert("Couldn't reach the server."); });
  }

  // ---------- slash commands: type / to see + pick; some are handled here (not posted) ----------
  var SLASH=[
    {cmd:"/find",     desc:"Search the board history (only you see the results)"},
    {cmd:"/export",   desc:"Download the whole transcript as Markdown"},
    {cmd:"/status",   desc:"Crew snapshot: roles, memory, who's typing/speaking"},
    {cmd:"/setvoice", desc:"Set an agent's speaking voice — /setvoice <agent> <voice>"},
    {cmd:"/voices",   desc:"List available voices + current assignments"},
    {cmd:"/respawn",  desc:"Restart one agent (drops its in-flight turn)"},
    {cmd:"/clear",    desc:"Clear the board history (for everyone)"},
    {cmd:"/mute",     desc:"Mute agent voices"},
    {cmd:"/unmute",   desc:"Unmute agent voices"},
    {cmd:"/restart",  desc:"Restart the server and the whole crew (flushes stuck agents)"},
    {cmd:"/shutdown", desc:"Stop the server and the whole crew"},
    {cmd:"/help",     desc:"Show these commands"}
  ];
  // Commands that take arguments: picking them from the palette leaves a trailing space so you
  // can type the args right away (generalized from the old /poll-only special case).
  var ARGCMDS={"/poll":1,"/find":1,"/setvoice":1,"/respawn":1};
  var sBox=null, sItems=[], sSel=0;
  function slashOpen(){ return !!sBox; }
  function slashClose(){ if(sBox){ sBox.remove(); sBox=null; } sItems=[]; sSel=0; }
  function slashRender(){
    var m=$("#text").value.match(/^\/([a-z]*)$/i);   // a command name being typed, no args yet
    if(!m){ slashClose(); return; }
    var matches=SLASH.filter(function(c){ return c.cmd.slice(1).indexOf(m[1].toLowerCase())===0; });
    if(!matches.length){ slashClose(); return; }
    sItems=matches; if(sSel>=matches.length) sSel=matches.length-1; if(sSel<0) sSel=0;
    if(!sBox){ sBox=document.createElement("div"); sBox.className="mention"; $("#form").appendChild(sBox); }
    sBox.innerHTML="";
    matches.forEach(function(c,idx){
      var mi=document.createElement("div"); mi.className="mi"+(idx===sSel?" sel":"");
      var s=document.createElement("span"); s.textContent=c.cmd; s.style.fontWeight="600"; mi.appendChild(s);
      var d=document.createElement("span"); d.className="mrole"; d.textContent=c.desc; mi.appendChild(d);
      mi.addEventListener("mousedown", function(e){ e.preventDefault(); slashChoose(idx); });
      sBox.appendChild(mi);
    });
    var ta=$("#text"), fr=$("#form").getBoundingClientRect(), tr=ta.getBoundingClientRect();
    sBox.style.left=Math.max(0,(tr.left-fr.left))+"px"; sBox.style.bottom=(fr.bottom-tr.top+6)+"px";
  }
  function slashChoose(idx){
    if(idx<0||idx>=sItems.length){ slashClose(); return; }
    var c=sItems[idx], ta=$("#text");
    ta.value = ARGCMDS[c.cmd] ? c.cmd+" " : c.cmd;   // arg-taking commands -> leave a space to type the args
    slashClose(); ta.focus();
  }
  function showCommands(){ var ta=$("#text"); ta.value="/"; ta.focus(); slashRender(); }
  function handleSlash(text){   // returns true if handled locally (do NOT post it)
    if(text==="/clear"){ doClear(); return true; }
    if(text==="/mute"){ setMuted(true); $("#text").value=""; renderChips(); return true; }
    if(text==="/unmute"){ setMuted(false); $("#text").value=""; renderChips(); return true; }
    if(text==="/restart"){ $("#text").value=""; renderChips(); restartServer(); return true; }
    if(text==="/shutdown"){ $("#text").value=""; renderChips(); shutdownServer(); return true; }
    if(text==="/help"){ showCommands(); return true; }
    // ----- operator commands: each is self-contained; the client-only ones never touch the board -----
    if(text==="/status"){ clearInput(); cmdStatus(); return true; }
    if(text==="/export"){ clearInput(); cmdExport(); return true; }
    if(text==="/voices"){ clearInput(); cmdVoices(); return true; }
    var mFind=text.match(/^\/find\s+([\s\S]+)$/);
    if(mFind){ clearInput(); cmdFind(mFind[1]); return true; }
    if(/^\/find\b/.test(text)){ clearInput(); localNote("<p><b>/find</b> — type something to search for, e.g. <code>/find deploy</code></p>"); return true; }
    var mVoice=text.match(/^\/setvoice\s+([a-z0-9_-]+)\s+(\S+)$/);
    if(mVoice){ clearInput(); cmdSetVoice(mVoice[1], mVoice[2]); return true; }
    if(/^\/setvoice\b/.test(text)){ clearInput(); localNote("<p><b>/setvoice</b> — usage: <code>/setvoice &lt;agent&gt; &lt;voice&gt;</code> &nbsp;(voice <code>off</code> clears it; see <code>/voices</code>)</p>"); return true; }
    var mResp=text.match(/^\/respawn\s+([a-z0-9_-]+)$/);
    if(mResp){ clearInput(); cmdRespawn(mResp[1]); return true; }
    if(/^\/respawn\b/.test(text)){ clearInput(); localNote("<p><b>/respawn</b> — usage: <code>/respawn &lt;agent&gt;</code></p>"); return true; }
    return false;
  }
  function clearInput(){ $("#text").value=""; renderChips(); slashClose(); }
  function restartServer(){
    if(!confirm("Restart the server and relaunch the whole crew? (flushes stuck agents; history is kept)")) return;
    fetch("/control/restart",{method:"POST",headers:headers()}).then(function(r){
      if(r.status===401){ askToken(); return; }
      if(r.status===404){ alert("Restart needs the server started with --control."); return; }
      // the board goes down for a few seconds; the header shows offline and the page
      // reconnects on its own once the supervisor brings the stack back
    }).catch(function(){});
  }
  function doClear(){
    if(!confirm("Clear the board history for everyone? This can't be undone.")) return;
    fetch("/control/clear",{method:"POST",headers:headers()}).then(function(r){
      if(r.status===401){ askToken(); return; }
      if(r.status===404){ alert("Clear needs the server started with --control."); return; }
      msgs.innerHTML=""; allMsgs=[]; seen={}; counts={}; lastId=0; $("#text").value=""; renderChips(); poll();
    }).catch(function(){ alert("Couldn't reach the server."); });
  }

  // ---------- @-mention chips + "you were tagged" row highlight ----------
  // After a message renders, wrap @name tokens in its TEXT (never code/pre/links) in a small color
  // pill. The tint reuses the SAME per-name hue() the avatars use, so a mention reads as "that
  // person"; @all gets the accent color. A message that @-names YOU (the #who name) also tints its
  // whole row, so "you were tagged" is scannable at a glance.
  var MENTION_RE=/(^|[\s(>])@(all|[A-Za-z0-9_-]{2,32})\b/g;
  function mentionChip(name){
    var span=document.createElement("span"), lc=(name||"").toLowerCase();
    if(lc==="all"){ span.className="mchip mchip-all"; }
    else { span.className="mchip"; span.style.setProperty("--mc-h", hue(name)+""); }  // hash the name AS TYPED -- av() hashes the raw sender, so @Will matches Will's avatar
    span.textContent="@"+name;   // textContent -> never re-injects HTML

  function decorateMentions(root){
    var walker=document.createTreeWalker(root, NodeFilter.SHOW_TEXT, { acceptNode:function(node){
      for(var p=node.parentNode; p && p!==root; p=p.parentNode){
        var t=p.nodeName; if(t==="A"||t==="CODE"||t==="PRE") return NodeFilter.FILTER_REJECT;
      }

    var targets=[], node;
    while((node=walker.nextNode())) targets.push(node);   // collect first, then mutate (can't edit mid-walk)
    targets.forEach(function(tn){
      var text=tn.nodeValue, frag=document.createDocumentFragment(), last=0, m; MENTION_RE.lastIndex=0;
      while((m=MENTION_RE.exec(text))){
        var at=m.index+m[1].length;                        // the '@' position (m[1] is the lead char, kept as text)
        if(at>last) frag.appendChild(document.createTextNode(text.slice(last,at)));
        frag.appendChild(mentionChip(m[2])); last=m.index+m[0].length;
      }
      if(!frag.childNodes.length) return;                  // no @mention in this node -> leave it be

  function findSnippet(text, qLower){

    return (s>0?"…":"")+esc(t.slice(s, idx))+"<mark>"+esc(t.slice(idx, idx+qLower.length))+"</mark>"+esc(t.slice(idx+qLower.length, e))+(e<t.length?"…":"");

  function cmdFind(query){
    // CLIENT-ONLY: case-insensitive substring search over sender+text of every message we've seen
    var q=(query||"").trim(), ql=q.toLowerCase();
    if(!ql){ localNote("<p>Nothing to search for — try <code>/find deploy</code>.</p>"); return; }
    var hits=[];
    for(var i=0;i<allMsgs.length && hits.length<20;i++){
      var m=allMsgs[i];
      if((((m.sender||"")+" "+(m.text||"")).toLowerCase()).indexOf(ql)>=0) hits.push(m);

    if(!hits.length){ localNote("<p>🔎 No messages match <b>"+esc(q)+"</b>.</p>"); return; }
    var rows=hits.map(function(m){
      return '<li><a href="#" data-jump="'+m.id+'">#'+m.id+" "+esc(m.sender||"?")+" ("+esc(when(m.ts))+")</a>: "+findSnippet(m.text, ql)+"</li>";

    var note=localNote("<p>🔎 <b>"+hits.length+"</b> match"+(hits.length===1?"":"es")+" for <b>"+esc(q)+"</b>"+(hits.length>=20?" (first 20)":"")+":</p><ul class=\"findhits\">"+rows+"</ul>");

  function add(m){
    if(seen[m.id]) return; seen[m.id]=1; allMsgs.push(m);

    if((m.text||"").indexOf("/vote ")===0) return;  // vote messages are plumbing, not shown

    top.appendChild(who); top.appendChild(wh); body.appendChild(top);

    var poll=renderPoll(m);
    if(poll){ body.appendChild(poll); }
    else { var tx=document.createElement("div"); tx.className="md"; tx.innerHTML=renderMarkdown(m.text||""); decorateMentions(tx); body.appendChild(tx); }

    el.appendChild(body);
    if(mentionsMe(m.text||"")) el.classList.add("tagged");   // a message that @-names you -> tint the row
    if(agentNames[m.sender]) speak(m.sender, m.text);
    var nearBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 140;
    msgs.appendChild(el);
    if(nearBottom) msgs.scrollTop = msgs.scrollHeight;

  function poll(){

      if(r.status===401){ askToken(); return null; }
      dot.classList.add("ok"); setConn(true); return r.json();
    }).then(function(data){
      if(!data) return;
      var incoming=data.messages||[];
      incoming.forEach(function(m){ add(m); if(m.id>lastId) lastId=m.id; });
      if(incoming.length) renderAgents();   // rebuild only on change, so the typing … animation isn't reset every poll
      updateAllPolls(); speakReady = true;
    }).catch(function(){ dot.classList.remove("ok"); setConn(false); });
  }

      .finally(function(){ $("#send").disabled=false; });

  // ---------- @-mention autocomplete: type @ to pick an agent from the crew ----------
  var mBox=null, mItems=[], mSel=0;
  function mOpen(){ return !!mBox; }
  function mNames(){
    var set={}; Object.keys(agentNames).forEach(function(n){set[n]=1;}); Object.keys(counts).forEach(function(n){set[n]=1;});
    delete set["all"];
    return ["all"].concat(Object.keys(set).sort());  // @all first -> explicit broadcast to the whole crew
  }

  function mToken(){   // the @word ending at the caret, if the @ starts a word
    var ta=$("#text"), pos=ta.selectionStart, val=ta.value, i=pos-1;
    while(i>=0 && /[a-z0-9_-]/i.test(val.charAt(i))) i--;
    if(i>=0 && val.charAt(i)==="@" && (i===0 || /[\s(]/.test(val.charAt(i-1)))) return {start:i, q:val.slice(i+1,pos)};
    return null;
  }
  function mRender(q){
    var matches=mNames().filter(function(n){ return n.toLowerCase().indexOf(q.toLowerCase())===0; });
    if(!matches.length){ mClose(); return; }
    mItems=matches; if(mSel>=matches.length) mSel=matches.length-1; if(mSel<0) mSel=0;
    if(!mBox){ mBox=document.createElement("div"); mBox.className="mention"; $("#form").appendChild(mBox); }
    mBox.innerHTML="";
    matches.forEach(function(n,idx){
      var mi=document.createElement("div"); mi.className="mi"+(idx===mSel?" sel":"")+(n==="all"?" allrow":"");
      mi.appendChild(av(n));

      if(n==="all"){ var ra=document.createElement("span"); ra.className="mrole"; ra.textContent="everyone"; mi.appendChild(ra); }
      else if(agentNames[n]){ var r=document.createElement("span"); r.className="mrole"; r.textContent="agent"; mi.appendChild(r); }
      mi.addEventListener("mousedown", function(e){ e.preventDefault(); mChoose(idx); });  // mousedown: fires before blur
      mBox.appendChild(mi);

        var ct=document.createElement("div"); ct.className="ct"; ct.textContent=t.title; c.appendChild(ct);
        var meta=document.createElement("div"); meta.className="cmeta";
        if(t.owner){ var ob=av(t.owner); ob.title="owner: "+t.owner; meta.appendChild(ob); }
        (t.assignees||[]).forEach(function(a){ if(a!==t.owner){ var ab=av(a); ab.title="assigned: "+a; meta.appendChild(ab); } });
        var age=document.createElement("span"); age.className="cage"; age.textContent=t.id+" · "+tage(t.updated); meta.appendChild(age);
        c.appendChild(meta);
        if(t.status==="done"&&t.summary){ var s=document.createElement("div"); s.className="csum"; s.textContent=t.summary; c.appendChild(s); }
        if(controlOn && t.status!=="done"){
          var b=document.createElement("div"); b.className="cbtns";
          var btn=function(label,fn){ var x=document.createElement("button"); x.textContent=label; x.addEventListener("click",fn); b.appendChild(x); };
          if(t.status==="open"||t.stale) btn(t.stale?"Adopt":"Claim", function(){ top({op:"claim", id:t.id, agent:meName()}); });
          if(t.status==="claimed") btn("→ Review", function(){ top({op:"status", id:t.id, lane:"review"}); });
          if(t.status==="review") btn("← Working", function(){ top({op:"status", id:t.id, lane:"claimed"}); });
          btn("✓ Done", function(){ var s=prompt("One-line summary (optional):")||""; top({op:"close", id:t.id, summary:s}); });
          c.appendChild(b);
        }
        lane.appendChild(c);
      });
      root.appendChild(lane);
    });
  }
  function loadThreads(){
    if(!kanbanOn) return;
    fetch("/threads",{headers:headers()}).then(function(r){ return r.status===200?r.json():null; })
      .then(function(j){ if(j&&j.threads){ threadsCache=j.threads; renderKanban(); } })
      .catch(function(){});
  }
  (function(){
    // 📋 opens the FULL board in its own tab (real estate); ▤ toggles the compact glance panel.
    var tb=$("#tasksbtn"); if(tb) tb.addEventListener("click", function(){ window.open("/tasks","_blank"); });
    var mb=$("#minibtn"); if(mb) mb.addEventListener("click", kanbanToggle);
    var ka=$("#kadd"); if(ka) ka.addEventListener("click", function(){
      var title=prompt("Task title:"); if(!title) return;
      top({op:"create", title:title, by:meName()});
    });
    if(kanbanOn) $("#kanban").classList.add("on");
  })();

  var pollTimer=setInterval(poll, 2000);
  var typeTimer=setInterval(loadTyping, 1200);
  var rosterTimer=setInterval(loadRoster, 4000);   // catch + Add agent / x edits to the lineup
  var ttsTimer=setInterval(loadTtsState, 5000);    // browser TTS auto-stands-down when a server speaker is live
  var thTimer=setInterval(loadThreads, 4000);      // task cards refresh only while the panel is open
  poll(); loadTyping(); loadTtsState(); loadThreads();
})();
</script>
<script>
// ============================================================
// ADDED: Settings screen (view-only) + theme picker.
// Self-contained IIFE — adds no globals, only READS existing
// endpoints (/health, /roster, /control/memory, /control/tts).
// ============================================================
(function(){
  "use strict";
  var THEME_KEY="fleetchat_theme", TOKEN_KEY="fleetchat_token", MUTE_KEY="fleetchat_muted";
  // Swatch preview colors (bg + accent) — kept in step with the CSS palettes above.
  var THEMES=[
    {id:"system", name:"System", auto:true},
    {id:"light",  name:"Light",  bg:"#f6f7f9", accent:"#3b6ea5"},
    {id:"dark",   name:"Dark",   bg:"#0f1216", accent:"#6ea8e0"},
    {id:"dusk",   name:"Dusk",   bg:"#191725", accent:"#9a84e0"},
    {id:"sepia",  name:"Sepia",  bg:"#f2e8d5", accent:"#9c6b3f"},
    {id:"harbor", name:"Harbor", bg:"#0e1a1f", accent:"#2f9d92"}
  ];
  function ls(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  function hdrs(){ var h={}, t=ls(TOKEN_KEY); if(t) h["X-Fleet-Token"]=t; return h; }
  function getTheme(){ return ls(THEME_KEY)||"system"; }
  function applyTheme(id){
    if(!id||id==="system") document.documentElement.removeAttribute("data-theme");
    else document.documentElement.setAttribute("data-theme", id);
    lsSet(THEME_KEY, id||"system");
  }
  applyTheme(getTheme());   // keep the live attribute in step with storage (head script did the pre-paint apply)

  function el(tag,cls,txt){ var d=document.createElement(tag); if(cls) d.className=cls; if(txt!=null) d.textContent=txt; return d; }
  function row(k,v){ var r=el("div","set-row"); r.appendChild(el("span","k",k)); r.appendChild(el("span","v",v==null?"—":String(v))); return r; }
  function section(title,node){ var s=el("div","set-sec"); s.appendChild(el("h3",null,title)); if(node) s.appendChild(node); return s; }

  var backdrop=null;
  function onKey(e){ if(e.key==="Escape"){ e.preventDefault(); close(); } }
  function close(){
    if(!backdrop) return;
    var b=backdrop; backdrop=null; b.classList.remove("show");
    document.removeEventListener("keydown", onKey);
    setTimeout(function(){ if(b&&b.parentNode) b.parentNode.removeChild(b); }, 200);
  }

  function themePicker(){
    var grid=el("div","theme-grid"), cur=getTheme();
    THEMES.forEach(function(t){
      var b=el("button","theme-sw"+(t.id===cur?" sel":"")); b.type="button"; b.title=t.name;
      var prev=el("div","sw-prev");
      prev.style.background = t.auto ? "linear-gradient(135deg,#f6f7f9 0 50%,#0f1216 50% 100%)" : t.bg;
      var dot=el("span","sw-dot"); dot.style.background = t.auto ? "#6ea8e0" : t.accent; prev.appendChild(dot);
      b.appendChild(prev); b.appendChild(el("span","sw-name", t.name));
      b.addEventListener("click", function(){
        applyTheme(t.id);
        grid.querySelectorAll(".theme-sw").forEach(function(x){ x.classList.remove("sel"); });
        b.classList.add("sel");
      });
      grid.appendChild(b);
    });
    return grid;
  }

  function open(){
    if(backdrop) return;
    backdrop=el("div","modal-backdrop");
    var modal=el("div","modal");
    var head=el("div","modal-head"); head.appendChild(el("h2",null,"Settings"));
    var x=el("button","x","×"); x.title="Close"; x.addEventListener("click", close); head.appendChild(x);
    modal.appendChild(head);
    var body=el("div","modal-body"); modal.appendChild(body);

    // Board — origin/port are local; version/control come from /health.
    var vVer=el("span","v","…"), vCtl=el("span","v","…");
    var board=section("Board");
    var rVer=el("div","set-row"); rVer.appendChild(el("span","k","Version")); rVer.appendChild(vVer); board.appendChild(rVer);
    var rCtl=el("div","set-row"); rCtl.appendChild(el("span","k","Control")); rCtl.appendChild(vCtl); board.appendChild(rCtl);
    board.appendChild(row("Origin", location.origin));
    board.appendChild(row("Port", location.port || (location.protocol==="https:"?"443":"80")));
    body.appendChild(board);

    // Crew — /roster (+ a /control/memory badge when that endpoint is readable).
    var crewBox=el("div"); crewBox.appendChild(el("div","set-note","loading…"));
    body.appendChild(section("Crew", crewBox));

    // Voice — /control/tts (falls back to the local mute flag when gated).
    var voiceBox=el("div");
    body.appendChild(section("Voice", voiceBox));

    // Appearance — the theme picker (the only interactive control here).
    body.appendChild(section("Appearance", themePicker()));

    body.appendChild(el("div","set-note","Settings are view-only for now."));

    backdrop.appendChild(modal);
    backdrop.addEventListener("click", function(e){ if(e.target===backdrop) close(); });
    document.body.appendChild(backdrop);
    document.addEventListener("keydown", onKey);
    requestAnimationFrame(function(){ if(backdrop) backdrop.classList.add("show"); });

    // ---- live reads (graceful: on 401/404/error a row shows "—" or is skipped) ----
    fetch("/health",{headers:hdrs()}).then(function(r){ return r.ok?r.json():null; }).then(function(h){
      vVer.textContent = (h&&h.version!=null) ? String(h.version) : "—";
      vCtl.textContent = (h&&h.control!=null) ? (h.control?"on":"off") : "—";
    }).catch(function(){ vVer.textContent="—"; vCtl.textContent="—"; });

    var rosP=fetch("/roster",{headers:hdrs()}).then(function(r){ return r.ok?r.json():null; }).catch(function(){ return null; });
    var memP=fetch("/control/memory",{headers:hdrs()}).then(function(r){ return r.ok?r.json():null; }).catch(function(){ return null; });
    Promise.all([rosP,memP]).then(function(res){
      var roster=(res[0]&&res[0].roster)||[], mem=(res[1]&&res[1].memory)||null;
      crewBox.innerHTML="";
      if(!roster.length){ crewBox.appendChild(el("div","set-note","No crew on the board.")); return; }
      roster.forEach(function(a){
        var r=el("div","set-crew");
        r.appendChild(el("span","nm", a.name||a.id));
        r.appendChild(el("span","rl", a.role||""));
        if(mem && Object.prototype.hasOwnProperty.call(mem, a.id)){
          var on=!!mem[a.id];
          r.appendChild(el("span","set-badge"+(on?" on":""), on?"memory on":"memory off"));
        }
        crewBox.appendChild(r);
      });
    });

    fetch("/control/tts",{headers:hdrs()}).then(function(r){ return r.ok?r.json():null; }).then(function(j){
      if(j){
        voiceBox.appendChild(row("Voices", j.muted?"muted":"on"));
        voiceBox.appendChild(row("Server speaker", j.server?"live":"not detected"));
      } else {
        voiceBox.appendChild(row("Voices", ls(MUTE_KEY)==="1"?"muted":"on"));
      }
    }).catch(function(){
      voiceBox.appendChild(row("Voices", ls(MUTE_KEY)==="1"?"muted":"on"));
    });
  }

  function wire(){ var btn=document.getElementById("settings"); if(btn) btn.addEventListener("click", open); }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", wire); else wire();
})();
</script>
</body>
</html>
