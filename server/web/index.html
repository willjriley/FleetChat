<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FleetChat</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1b1f24; --muted:#6b7480;
    --line:#e5e8ec; --accent:#3b6ea5; --chip:#eef1f5; --codebg:#f4f6f8;
    --t-str:#0a7d33; --t-com:#8a8f98; --t-num:#b5720a; --t-kw:#8250df;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0f1216; --panel:#171b21; --ink:#e8ebef; --muted:#8b95a1;
           --line:#252b33; --accent:#6ea8e0; --chip:#222831; --codebg:#12161c;
           --t-str:#7ee787; --t-com:#8b949e; --t-num:#f0b072; --t-kw:#d2a8ff; }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line)}
  header h1{font-size:17px;margin:0;letter-spacing:.3px}
  header .dot{width:9px;height:9px;border-radius:50%;background:#c0392b;transition:background .3s}
  header .dot.ok{background:#2e9e5b}
  header .scope{margin-left:auto;font-size:12px;color:var(--muted)}
  header .ctl{margin-left:12px;font:inherit;font-size:12px;color:var(--ink);background:var(--chip);border:1px solid var(--line);border-radius:7px;padding:3px 11px;cursor:pointer}
  header .ctl:hover{border-color:#c0392b;color:#c0392b}
  main{flex:1;display:flex;min-height:0}
  .side{width:210px;border-right:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:12px}
  .side h2{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:4px 4px 10px}
  .agent{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px}
  .agent .av{width:22px;height:22px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:700}
  .agent .nm{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .agent .ct{margin-left:auto;font-size:11px;color:var(--muted)}
  .agent .kick{margin-left:6px;border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;padding:0 3px;border-radius:4px}
  .agent .kick:hover{color:#c0392b;background:var(--chip)}
  .addbtn{margin:12px 4px 0;width:calc(100% - 8px);font:inherit;font-size:12px;color:var(--accent);background:transparent;border:1px dashed var(--line);border-radius:8px;padding:7px;cursor:pointer}
  .addbtn:hover{border-color:var(--accent);background:var(--chip)}
  .feed{flex:1;display:flex;flex-direction:column;min-width:0}
  .msgs{flex:1;overflow-y:auto;padding:18px}
  .msg{max-width:820px;margin:0 auto 14px;display:flex;gap:11px}
  .msg .av{width:30px;height:30px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:700}
  .msg .body{flex:1;min-width:0}
  .msg .top{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
  .msg .who{font-weight:600}
  .msg .when{font-size:11px;color:var(--muted)}
  .msg .tags{margin-top:5px;display:flex;flex-wrap:wrap;gap:5px}
  .tag{font-size:11px;color:var(--muted);background:var(--chip);border-radius:20px;padding:1px 9px}
  /* rich content */
  .md{word-wrap:break-word;overflow-wrap:anywhere}
  .md p{margin:2px 0}
  .md h2{font-size:18px;margin:9px 0 4px} .md h3{font-size:16px;margin:8px 0 3px} .md h4{font-size:14px;margin:7px 0 3px}
  .md ul,.md ol{margin:4px 0;padding-left:22px} .md li{margin:1px 0}
  .md a{color:var(--accent);text-decoration:none} .md a:hover{text-decoration:underline}
  code.inline{background:var(--chip);border-radius:4px;padding:1px 5px;font:12.5px ui-monospace,Consolas,monospace}
  .code{position:relative;margin:8px 0;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--codebg)}
  .code .lang{position:absolute;top:0;right:0;font-size:10px;color:var(--muted);background:var(--chip);padding:1px 7px;border-radius:0 0 0 6px;text-transform:uppercase;letter-spacing:.5px}
  .code pre{margin:0;overflow-x:auto;padding:8px 0;font:12.5px/1.55 ui-monospace,Consolas,monospace}
  .cl{display:flex;padding:0 12px}
  .cl .ln{flex:none;width:2.2em;text-align:right;margin-right:12px;color:var(--muted);opacity:.55;user-select:none}
  .cl .lc{white-space:pre}
  .s-str{color:var(--t-str)} .s-com{color:var(--t-com);font-style:italic} .s-num{color:var(--t-num)} .s-kw{color:var(--t-kw);font-weight:600}
  .poll{margin:8px 0;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--panel)}
  .poll-q{font-weight:600;margin-bottom:8px}
  .poll-opt{position:relative;display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:7px;padding:7px 10px;margin:5px 0;cursor:pointer;overflow:hidden;font:inherit}
  .poll-opt .bar{position:absolute;left:0;top:0;bottom:0;width:0;background:color-mix(in srgb,var(--accent) 22%,transparent);transition:width .35s;z-index:0}
  .poll-opt .opt-label{position:relative;z-index:1}
  .poll-opt .opt-count{position:relative;z-index:1;float:right;color:var(--muted);font-size:12px}
  .poll-foot{font-size:11px;color:var(--muted);margin-top:6px}
  form{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--line);background:var(--panel);position:relative}
  .mention{position:absolute;z-index:30;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 26px rgba(0,0,0,.16);padding:4px;max-height:220px;overflow-y:auto;min-width:180px}
  .mention .mi{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:7px;cursor:pointer;font-size:13px;white-space:nowrap}
  .mention .mi.sel{background:var(--chip)}
  .mention .mi .av{width:20px;height:20px;font-size:10px}
  .mention .mi .mrole{color:var(--muted);font-size:11px;margin-left:auto;padding-left:10px}
  input,textarea{font:inherit;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px}
  #who{width:120px}
  #text{flex:1;resize:none;height:40px}
  button.send{font:inherit;font-weight:600;color:#fff;background:var(--accent);border:0;border-radius:9px;padding:0 18px;cursor:pointer}
  button.send:disabled{opacity:.5;cursor:default}
  .empty{color:var(--muted);text-align:center;margin-top:40px}
</style>
</head>
<body>
<header>
  <span class="dot" id="dot"></span>
  <h1>FleetChat</h1>
  <span class="scope" id="scope"></span>
  <button id="mute" class="ctl" title="Agent voices on/off">🔊</button>
  <button id="shutdown" class="ctl" style="display:none" title="Stop the server and the whole crew">Shut down</button>
</header>
<main>
  <aside class="side">
    <h2>On the board</h2>
    <div id="agents"></div>
    <button id="addagent" class="addbtn" style="display:none">+ Add agent</button>
  </aside>
  <section class="feed">
    <div class="msgs" id="msgs"><div class="empty">Waiting for the crew to join…</div></div>
    <form id="form">
      <input id="who" placeholder="your name" autocomplete="off">
      <textarea id="text" placeholder="Message the crew…   markdown, `code`, [links](https://…), or /poll to start a poll"></textarea>
      <button class="send" id="send" type="submit">Send</button>
    </form>
  </section>
</main>
<script>
(function(){
  var lastId = 0, token = localStorage.getItem("fleetchat_token") || "";
  var counts = {}, seen = {}, allMsgs = [], controlOn = false, agentNames = {};
  var $ = function(s){ return document.querySelector(s); };
  var msgs = $("#msgs"), agents = $("#agents"), dot = $("#dot"), scope = $("#scope");

  function hue(s){ var h=0; for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))%360; return h; }
  function av(s){ var d=document.createElement("div"); d.className="av";
    d.style.background="hsl("+hue(s)+" 55% 45%)"; d.textContent=(s[0]||"?").toUpperCase(); return d; }
  function when(ts){ return new Date(ts*1000).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}); }
  function headers(extra){ var h=Object.assign({}, extra||{}); if(token) h["X-Fleet-Token"]=token; return h; }

  // ---------- agent voices: the browser's own speech synthesis (zero dependency) ----------
  var muted = localStorage.getItem("fleetchat_muted")==="1";
  var speakReady = false, voices = [];
  function loadVoices(){ try{ voices=(window.speechSynthesis && speechSynthesis.getVoices())||[]; }catch(e){} }
  if(window.speechSynthesis){ loadVoices(); try{ speechSynthesis.onvoiceschanged=loadVoices; }catch(e){} }
  function voiceFor(name){
    if(!voices.length) loadVoices();
    if(!voices.length) return null;
    var h=0; for(var i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))%voices.length;
    return voices[h];
  }
  function cleanForSpeech(t){
    return (t||"").replace(/```[\s\S]*?```/g," , code, ").replace(/`([^`]+)`/g,"$1")
      .replace(/\[([^\]]+)\]\([^)]+\)/g,"$1").replace(/https?:\/\/\S+/g," link ")
      .replace(/[*#_>|]/g,"").replace(/\s+/g," ").trim().slice(0,400);
  }
  function speak(sender, text){
    if(muted || !speakReady || !window.speechSynthesis) return;
    var say=cleanForSpeech(text); if(!say) return;
    var u=new SpeechSynthesisUtterance(say); var v=voiceFor(sender); if(v) u.voice=v; u.rate=1.05;
    try{ speechSynthesis.speak(u); }catch(e){}
  }
  function setMuted(m){
    muted=m; localStorage.setItem("fleetchat_muted", m?"1":"0");
    var b=$("#mute"); if(b) b.textContent = m ? "🔇" : "🔊";
    if(m && window.speechSynthesis){ try{ speechSynthesis.cancel(); }catch(e){} }
  }
  (function(){ var b=$("#mute"); if(!b) return; if(!window.speechSynthesis){ b.style.display="none"; return; } b.textContent = muted ? "🔇" : "🔊"; b.addEventListener("click", function(){ setMuted(!muted); }); })();

  // ---------- safe rich rendering (escape FIRST, then formatting) ----------
  function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

  function highlight(escLine){   // light, language-agnostic token coloring on already-escaped text
    return escLine
      .replace(/(&quot;.*?&quot;|&#39;.*?&#39;)/g,'<span class="s-str">$1</span>')
      .replace(/(#.*|\/\/.*)/g,'<span class="s-com">$1</span>')
      .replace(/\b(\d+(?:\.\d+)?)\b/g,'<span class="s-num">$1</span>')
      .replace(/\b(def|class|function|return|if|else|elif|for|while|import|from|export|const|let|var|new|try|except|catch|finally|await|async|true|false|null|None|True|False)\b/g,'<span class="s-kw">$1</span>');
  }
  function renderCode(code, lang){
    var lines = code.replace(/\n$/,"").split("\n");
    var body = lines.map(function(l,i){
      return '<div class="cl"><span class="ln">'+(i+1)+'</span><span class="lc">'+highlight(esc(l))+'</span></div>';
    }).join("");
    return '<div class="code">'+(lang?'<span class="lang">'+esc(lang)+'</span>':'')+'<pre>'+body+'</pre></div>';
  }
  function mdInline(t){   // t is ALREADY escaped
    t = t.replace(/`([^`]+)`/g,'<code class="inline">$1</code>');
    t = t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    t = t.replace(/\*([^*\s][^*]*?)\*/g,'<em>$1</em>');
    t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    t = t.replace(/(^|[\s(>])((?:https?:\/\/)[^\s<)]+)/g,'$1<a href="$2" target="_blank" rel="noopener noreferrer">$2</a>');
    return t;
  }
  function renderMarkdown(src){
    var blocks=[];
    src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, function(m,lang,code){ blocks.push(renderCode(code,lang)); return "CB"+(blocks.length-1)+""; });
    var lines = src.split("\n"), out=[], i=0;
    while(i<lines.length){
      var ln=lines[i];
      if(/^CB\d+\s*$/.test(ln.trim())){ out.push(ln.trim()); i++; continue; }
      var h=ln.match(/^(#{1,3})\s+(.*)$/);
      if(h){ var lvl=h[1].length+1; out.push("<h"+lvl+">"+mdInline(esc(h[2]))+"</h"+lvl+">"); i++; continue; }
      if(/^[-*]\s+/.test(ln)){ var it=[]; while(i<lines.length&&/^[-*]\s+/.test(lines[i])){ it.push("<li>"+mdInline(esc(lines[i].replace(/^[-*]\s+/,"")))+"</li>"); i++; } out.push("<ul>"+it.join("")+"</ul>"); continue; }
      if(/^\d+\.\s+/.test(ln)){ var it2=[]; while(i<lines.length&&/^\d+\.\s+/.test(lines[i])){ it2.push("<li>"+mdInline(esc(lines[i].replace(/^\d+\.\s+/,"")))+"</li>"); i++; } out.push("<ol>"+it2.join("")+"</ol>"); continue; }
      if(ln.trim()===""){ i++; continue; }
      out.push("<p>"+mdInline(esc(ln))+"</p>"); i++;
    }
    return out.join("").replace(/CB(\d+)/g, function(m,x){ return blocks[x]; });
  }

  // ---------- polls (votes are just board messages: /vote <pollId> <idx>) ----------
  function parsePoll(text){
    if(!/^\/poll\s+/.test(text)) return null;
    var lines=text.split("\n");
    var q=lines[0].replace(/^\/poll\s+/,"").trim();
    var opts=lines.slice(1).filter(function(l){return /^[-*]\s+/.test(l);}).map(function(l){return l.replace(/^[-*]\s+/,"").trim();});
    return opts.length ? {q:q, opts:opts} : null;
  }
  function tally(pollId, nOpts){
    var votes={}, counts=[], total=0, k;
    for(k=0;k<nOpts;k++) counts.push(0);
    allMsgs.forEach(function(m){
      var v=(m.text||"").match(/^\/vote\s+(\d+)\s+(\d+)/);
      if(v && +v[1]===pollId) votes[m.sender]=+v[2];
    });
    Object.keys(votes).forEach(function(s){ var idx=votes[s]; if(idx>=0&&idx<nOpts){ counts[idx]++; total++; } });
    return {counts:counts, total:total};
  }
  function renderPoll(msg){
    var p=parsePoll(msg.text); if(!p) return null;
    var el=document.createElement("div"); el.className="poll"; el.dataset.pollId=msg.id; el.dataset.n=p.opts.length;
    var q=document.createElement("div"); q.className="poll-q"; q.textContent=p.q; el.appendChild(q);
    p.opts.forEach(function(opt,idx){
      var b=document.createElement("button"); b.className="poll-opt"; b.dataset.idx=idx; b.type="button";
      var bar=document.createElement("span"); bar.className="bar";
      var lab=document.createElement("span"); lab.className="opt-label"; lab.textContent=opt;
      var cnt=document.createElement("span"); cnt.className="opt-count";
      b.appendChild(bar); b.appendChild(lab); b.appendChild(cnt);
      b.addEventListener("click", function(){ vote(msg.id, idx); });
      el.appendChild(b);
    });
    var foot=document.createElement("div"); foot.className="poll-foot"; el.appendChild(foot);
    return el;
  }
  function updatePoll(el){
    var pollId=+el.dataset.pollId, n=+el.dataset.n, t=tally(pollId, n);
    el.querySelectorAll(".poll-opt").forEach(function(row){
      var idx=+row.dataset.idx, c=t.counts[idx], pct=t.total?Math.round(c/t.total*100):0;
      row.querySelector(".bar").style.width=pct+"%";
      row.querySelector(".opt-count").textContent=c+" ("+pct+"%)";
    });
    el.querySelector(".poll-foot").textContent=t.total+" vote"+(t.total===1?"":"s")+" · click to vote (re-click to change)";
  }
  function updateAllPolls(){ document.querySelectorAll(".poll").forEach(updatePoll); }
  function vote(pollId, idx){
    fetch("/post",{method:"POST",headers:headers({"Content-Type":"application/json"}),
      body:JSON.stringify({sender:($("#who").value||"you").trim(), text:"/vote "+pollId+" "+idx, tags:["vote"]})})
      .then(function(r){ if(r.status===401){ askToken(); } else { poll(); } });
  }

  function renderAgents(){
    agents.innerHTML="";
    Object.keys(counts).sort().forEach(function(name){
      var row=document.createElement("div"); row.className="agent";
      row.appendChild(av(name));
      var nm=document.createElement("span"); nm.className="nm"; nm.textContent=name;
      var ct=document.createElement("span"); ct.className="ct"; ct.textContent=counts[name];
      row.appendChild(nm); row.appendChild(ct);
      if(controlOn && agentNames[name]){
        var x=document.createElement("button"); x.className="kick"; x.textContent="×"; x.title="Remove "+name;
        x.addEventListener("click", function(){ kickAgent(name); });
        row.appendChild(x);
      }
      agents.appendChild(row);
    });
  }
  function kickAgent(name){
    if(!confirm("Remove "+name+" from the crew?")) return;
    fetch("/control/kick",{method:"POST",headers:headers({"Content-Type":"application/json"}),
      body:JSON.stringify({agent:name})})
      .then(function(r){ if(r.status===401){askToken();} else { delete agentNames[name]; poll(); } });
  }
  function addAgent(){
    // native folder picker first (a real OS dialog on this machine); typed-path fallback
    fetch("/control/pick",{method:"POST",headers:headers()})
      .then(function(r){ return r.json().then(function(j){ return {s:r.status,j:j}; }); })
      .then(function(res){
        if(res.s===401){ askToken(); return; }
        if(res.s===200 && res.j.folder){ doAdd(res.j.folder); return; }
        if(res.j && res.j.error==="cancelled"){ return; }
        var f=prompt("Paste the project folder path for the new agent (its name becomes the agent name):");
        if(f) doAdd(f.trim());
      })
      .catch(function(){ var f=prompt("Paste the project folder path for the new agent:"); if(f) doAdd(f.trim()); });
  }
  function doAdd(folder){
    fetch("/control/add",{method:"POST",headers:headers({"Content-Type":"application/json"}),
      body:JSON.stringify({folder:folder})})
      .then(function(r){ return r.json().then(function(j){ return {s:r.status,j:j}; }); })
      .then(function(res){
        if(res.s===401){ askToken(); }
        else if(res.s>=400){ alert("Couldn't add agent: "+(res.j.error||res.s)); }
        else { poll(); }
      }).catch(function(){ alert("Couldn't reach the server."); });
  }

  function add(m){
    if(seen[m.id]) return; seen[m.id]=1; allMsgs.push(m);
    if((m.tags||[]).indexOf("join")>=0) agentNames[m.sender]=1;
    if((m.text||"").indexOf("/vote ")===0) return;  // vote messages are plumbing, not shown
    if(msgs.querySelector(".empty")) msgs.innerHTML="";
    counts[m.sender]=(counts[m.sender]||0)+1;
    var el=document.createElement("div"); el.className="msg";
    el.appendChild(av(m.sender));
    var body=document.createElement("div"); body.className="body";
    var top=document.createElement("div"); top.className="top";
    var who=document.createElement("span"); who.className="who"; who.textContent=m.sender;
    var wh=document.createElement("span"); wh.className="when"; wh.textContent=when(m.ts);
    top.appendChild(who); top.appendChild(wh); body.appendChild(top);

    var poll=renderPoll(m);
    if(poll){ body.appendChild(poll); }
    else { var tx=document.createElement("div"); tx.className="md"; tx.innerHTML=renderMarkdown(m.text||""); body.appendChild(tx); }

    if(m.tags && m.tags.length){ var t=document.createElement("div"); t.className="tags";
      m.tags.forEach(function(x){ if(x==="vote")return; var c=document.createElement("span"); c.className="tag"; c.textContent="#"+x; t.appendChild(c); }); body.appendChild(t); }
    el.appendChild(body);
    if(agentNames[m.sender]) speak(m.sender, m.text);
    var nearBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 140;
    msgs.appendChild(el);
    if(nearBottom) msgs.scrollTop = msgs.scrollHeight;
  }

  function poll(){
    fetch("/messages?since="+lastId, {headers:headers()}).then(function(r){
      if(r.status===401){ askToken(); return null; }
      dot.classList.add("ok"); return r.json();
    }).then(function(data){
      if(!data) return;
      (data.messages||[]).forEach(function(m){ add(m); if(m.id>lastId) lastId=m.id; });
      renderAgents(); updateAllPolls(); speakReady = true;
    }).catch(function(){ dot.classList.remove("ok"); });
  }

  function askToken(){
    dot.classList.remove("ok");
    var t=prompt("This board is networked — enter the shared token:");
    if(t){ token=t; localStorage.setItem("fleetchat_token", t); }
  }

  $("#form").addEventListener("submit", function(e){
    e.preventDefault();
    var sender=($("#who").value||"you").trim(), text=$("#text").value.trim();
    if(!text) return;
    $("#send").disabled=true;
    fetch("/post", {method:"POST", headers:headers({"Content-Type":"application/json"}),
      body:JSON.stringify({sender:sender, text:text, tags:[]})})
      .then(function(r){ if(r.status===401){ askToken(); } else { $("#text").value=""; poll(); } })
      .finally(function(){ $("#send").disabled=false; });
  });
  // ---------- @-mention autocomplete: type @ to pick an agent from the crew ----------
  var mBox=null, mItems=[], mSel=0;
  function mOpen(){ return !!mBox; }
  function mNames(){
    var set={}; Object.keys(agentNames).forEach(function(n){set[n]=1;}); Object.keys(counts).forEach(function(n){set[n]=1;});
    return Object.keys(set).sort();
  }
  function mClose(){ if(mBox){ mBox.remove(); mBox=null; } mItems=[]; mSel=0; }
  function mToken(){   // the @word ending at the caret, if the @ starts a word
    var ta=$("#text"), pos=ta.selectionStart, val=ta.value, i=pos-1;
    while(i>=0 && /[a-z0-9_-]/i.test(val.charAt(i))) i--;
    if(i>=0 && val.charAt(i)==="@" && (i===0 || /[\s(]/.test(val.charAt(i-1)))) return {start:i, q:val.slice(i+1,pos)};
    return null;
  }
  function mRender(q){
    var matches=mNames().filter(function(n){ return n.toLowerCase().indexOf(q.toLowerCase())===0; });
    if(!matches.length){ mClose(); return; }
    mItems=matches; if(mSel>=matches.length) mSel=matches.length-1; if(mSel<0) mSel=0;
    if(!mBox){ mBox=document.createElement("div"); mBox.className="mention"; $("#form").appendChild(mBox); }
    mBox.innerHTML="";
    matches.forEach(function(n,idx){
      var mi=document.createElement("div"); mi.className="mi"+(idx===mSel?" sel":"");
      mi.appendChild(av(n));
      var s=document.createElement("span"); s.textContent="@"+n; mi.appendChild(s);   // textContent -> XSS-safe
      if(agentNames[n]){ var r=document.createElement("span"); r.className="mrole"; r.textContent="agent"; mi.appendChild(r); }
      mi.addEventListener("mousedown", function(e){ e.preventDefault(); mChoose(idx); });  // mousedown: fires before blur
      mBox.appendChild(mi);
    });
    var ta=$("#text"), fr=$("#form").getBoundingClientRect(), tr=ta.getBoundingClientRect();
    mBox.style.left=Math.max(0,(tr.left-fr.left))+"px";
    mBox.style.bottom=(fr.bottom-tr.top+6)+"px";
  }
  function mChoose(idx){
    var t=mToken(); if(!t || idx<0 || idx>=mItems.length){ mClose(); return; }
    var ta=$("#text"), val=ta.value, pos=ta.selectionStart, ins="@"+mItems[idx]+" ";
    ta.value=val.slice(0,t.start)+ins+val.slice(pos);
    var np=t.start+ins.length; ta.setSelectionRange(np,np); mClose(); ta.focus();
  }
  $("#text").addEventListener("input", function(){ var t=mToken(); if(t) mRender(t.q); else mClose(); });
  $("#text").addEventListener("keydown", function(e){   // registered BEFORE the send-handler -> intercepts Enter when the list is open
    if(!mBox) return;
    if(e.key==="ArrowDown"){ e.preventDefault(); mSel=(mSel+1)%mItems.length; mRender((mToken()||{q:""}).q); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); mSel=(mSel-1+mItems.length)%mItems.length; mRender((mToken()||{q:""}).q); }
    else if(e.key==="Enter"||e.key==="Tab"){ e.preventDefault(); e.stopImmediatePropagation(); mChoose(mSel); }
    else if(e.key==="Escape"){ e.preventDefault(); e.stopImmediatePropagation(); mClose(); }
  });
  $("#text").addEventListener("blur", function(){ setTimeout(mClose, 150); });
  // Enter sends -- unless the @-mention list is open (that case is handled above)
  $("#text").addEventListener("keydown", function(e){ if(e.key==="Enter" && !e.shiftKey && !mOpen()){ e.preventDefault(); $("#form").requestSubmit(); }});
  // remember the name you post under, so you're not a default "you"
  var savedName=localStorage.getItem("fleetchat_name"); if(savedName){ $("#who").value=savedName; }
  $("#who").addEventListener("change", function(){ localStorage.setItem("fleetchat_name", ($("#who").value||"").trim()); });

  fetch("/health").then(function(r){return r.json();}).then(function(h){
    scope.textContent=h.version||"";
    controlOn = !!h.control;
    if(controlOn){ var sb=$("#shutdown"); sb.style.display=""; sb.addEventListener("click", shutdownServer); var ab=$("#addagent"); if(ab){ ab.style.display=""; ab.addEventListener("click", addAgent); } }
  }).catch(function(){});
  function shutdownServer(){
    if(!confirm("Shut down the FleetChat server and stop the whole crew?")) return;
    fetch("/shutdown",{method:"POST",headers:headers()}).then(function(r){
      if(r.status===401){ askToken(); return; }
      serverStopped();
    }).catch(serverStopped);  // the server dies mid-response -- that's expected
  }
  function serverStopped(){
    dot.classList.remove("ok"); clearInterval(pollTimer);
    msgs.innerHTML='<div class="empty">Server shut down. Restart with the launcher or python run.py.</div>';
    var sb=$("#shutdown"); if(sb) sb.style.display="none";
  }
  var pollTimer=setInterval(poll, 2000);
  poll();
})();
</script>
</body>
