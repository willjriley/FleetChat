<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FleetChat — Task board</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1b1f24; --muted:#6b7480;
    --line:#e5e8ec; --accent:#3b6ea5; --chip:#eef1f5;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0f1216; --panel:#171b21; --ink:#e8ebef; --muted:#8b95a1;
           --line:#252b33; --accent:#6ea8e0; --chip:#222831; }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line)}
  header h1{font-size:16px;margin:0}
  header a{color:var(--accent);text-decoration:none;font-size:13px}
  header a:hover{text-decoration:underline}
  header .sp{margin-left:auto}
  .newbtn{font:inherit;font-size:13px;color:#fff;background:var(--accent);border:0;border-radius:8px;padding:7px 14px;cursor:pointer}
  /* min-height:0 lets .board honor flex:1 (viewport minus header) instead of growing to its
     min-content height. A flex item's default min-height:auto would expand .board to fit every
     card and scroll the whole PAGE; bounded here, .col's max-height:100% resolves and each
     .cards list scrolls internally instead. */
  .board{flex:1;display:flex;gap:14px;padding:16px;overflow-x:auto;align-items:flex-start;min-height:0}
  .col{flex:0 0 270px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;max-height:100%;display:flex;flex-direction:column}
  .col h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:2px 4px 10px;display:flex;align-items:center;gap:7px}
  .col h2 .n{background:var(--chip);border-radius:10px;padding:0 8px;font-weight:600}
  .cards{overflow-y:auto;min-height:30px}
  .card{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:0 0 8px;background:var(--bg)}
  .card.claimed{border-left:3px solid var(--accent)}
  .card.stale{border-left:3px solid #d68910;animation:amber 1.6s infinite}
  .card.done{opacity:.6}
  @keyframes amber{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 2px rgba(214,137,16,.28)}}
  .card .t{font-size:13.5px;font-weight:600;line-height:1.35;word-wrap:break-word}
  .card .meta{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
  .av{width:20px;height:20px;border-radius:50%;display:inline-grid;place-items:center;color:#fff;font-size:10px;font-weight:700;flex:none}
  .card .who{font-size:11.5px;color:var(--muted)}
  .card .age{margin-left:auto;font-size:11px;color:var(--muted)}
  .card .sum{font-size:12px;color:var(--muted);font-style:italic;margin-top:6px}
  .card .btns{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .card .btns button{font:inherit;font-size:11.5px;color:var(--ink);background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:3px 9px;cursor:pointer}
  .card .btns button:hover{border-color:var(--accent);color:var(--accent)}
  .empty{font-size:12px;color:var(--muted);margin:4px;text-align:center}
  /* Task create/edit dialog: one reusable modal (replaces prompt()/alert()). Reuses the same
     --panel/--ink/--line/--accent/--chip vars, so it themes light + dark with the rest of the page. */
  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50}
  .modal{width:min(440px,100%);background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:16px 16px 14px;box-shadow:0 12px 40px rgba(0,0,0,.35)}
  .modal h3{margin:0 0 12px;font-size:15px}
  .modal label{display:block;font-size:12px;color:var(--muted);margin:0 0 4px}
  .modal input,.modal textarea{width:100%;font:inherit;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin:0 0 12px}
  .modal textarea{min-height:76px;resize:vertical}
  .modal input:focus,.modal textarea:focus{outline:none;border-color:var(--accent)}
  .modal .row{display:flex;justify-content:flex-end;gap:8px}
  .modal .row button{font:inherit;font-size:13px;border-radius:8px;padding:7px 14px;cursor:pointer;border:1px solid var(--line)}
  .modal .row .cancel{background:var(--chip);color:var(--ink)}
  .modal .row .save{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>📋 Task board</h1>
  <a href="/" id="backlink">&larr; back to the chat</a>
  <span class="sp"></span>
  <button class="newbtn" id="newtask" style="display:none">+ New task</button>
</header>
<div class="board" id="board"></div>
<script>
(function(){
  var $=function(s){return document.querySelector(s);};
  var token=localStorage.getItem("fleetchat_token")||"";
  function headers(extra){ var h=extra||{}; h["X-Fleet-Client"]="1"; if(token) h["X-Fleet-Token"]=token; return h; }
  // The classic left-to-right lanes; Backlog = parked/someday, Open = ready to take.
  var LANES=[["backlog","Backlog"],["open","Open"],["claimed","In progress"],["review","Review"],["done","Done"]];
  var cache=[];
  function hue(s){ var h=0; for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))%360; return h; }
  function av(s){ var d=document.createElement("span"); d.className="av";
    d.style.background="hsl("+hue(s)+" 55% 45%)"; d.textContent=(s[0]||"?").toUpperCase(); d.title=s; return d; }
  function tage(ts){ var s=(Date.now()/1000-ts); if(s<90)return "now"; if(s<3600)return Math.round(s/60)+"m";
    if(s<86400)return Math.round(s/3600)+"h"; return Math.round(s/86400)+"d"; }
  function fdate(ts){ var d=new Date(ts*1000); return (d.getMonth()+1)+"/"+d.getDate()+" "+
    ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2); }
  var DONE_SHOW_SECS=48*3600;   // done cards stay VISIBLE for 48h, then live on in the ledger unseen
  function me(){ var n=(localStorage.getItem("fleetchat_name")||"").trim().toLowerCase().replace(/[^a-z0-9_-]/g,""); return n||"operator"; }
  function op(body){
    fetch("/threads",{method:"POST",headers:headers({"Content-Type":"application/json"}),body:JSON.stringify(body)})
      .then(function(r){ return r.json(); }).then(function(j){ if(j&&j.error) alert(j.error); load(); })
      .catch(function(){ alert("couldn't reach the server -- try again"); });
  }
  // One reusable modal for BOTH create and edit -- replaces the old prompt() calls.
  // openTaskDialog({id,title,desc,onSave}); onSave({title,desc}) fires on Save. Closes on
  // Escape, Cancel, or a backdrop (outside-the-box) click. No id => "New task" heading.
  function openTaskDialog(opts){
    opts=opts||{};
    var prevFocus=document.activeElement;   // restore here on close -- otherwise focus drops to <body>
    var back=document.createElement("div"); back.className="modal-back";
    var box=document.createElement("div"); box.className="modal";
    box.setAttribute("role","dialog"); box.setAttribute("aria-modal","true");
    var h=document.createElement("h3"); h.textContent=(opts.id!=null?"Edit task":"New task"); box.appendChild(h);
    var lt=document.createElement("label"); lt.textContent="Title"; box.appendChild(lt);
    var ti=document.createElement("input"); ti.type="text"; ti.value=opts.title||""; ti.placeholder="What needs doing?"; box.appendChild(ti);
    var ld=document.createElement("label"); ld.textContent="Description"; box.appendChild(ld);
    var de=document.createElement("textarea"); de.value=opts.desc||""; de.placeholder="Optional details"; box.appendChild(de);
    var row=document.createElement("div"); row.className="row";
    var cancel=document.createElement("button"); cancel.type="button"; cancel.className="cancel"; cancel.textContent="Cancel";
    var save=document.createElement("button"); save.type="button"; save.className="save"; save.textContent="Save";
    row.appendChild(cancel); row.appendChild(save); box.appendChild(row); back.appendChild(box);
    var trapped=[ti,de,cancel,save];   // tab order inside the dialog -- also the trap cycle below
    function close(){
      document.removeEventListener("keydown", onKey);
      if(back.parentNode) back.parentNode.removeChild(back);
      if(prevFocus && typeof prevFocus.focus==="function") prevFocus.focus();   // e.g. back to the ✎/+New task button
    }
    function submit(){
      var title=ti.value.trim(); if(!title){ ti.focus(); return; }   // title required, mirrors the old prompt (empty => no-op)
      close();
      if(opts.onSave) opts.onSave({title:title, desc:de.value.trim()});
    }
    function onKey(e){
      if(e.key==="Escape"){ e.preventDefault(); close(); }
      else if(e.key==="Enter" && (e.metaKey||e.ctrlKey)){ e.preventDefault(); submit(); }
      else if(e.key==="Tab"){
        // aria-modal="true" claims this traps focus -- make that true, not just an AT hint:
        // without this, Tab walks straight past Save/Cancel into whatever's behind the backdrop
        // (e.g. another card's ✎ button), which can stack a second dialog on top of this one.
        var i=trapped.indexOf(document.activeElement);
        if(i===-1) return;   // focus is somehow outside the dialog already -- don't fight it
        e.preventDefault();
        var next=e.shiftKey ? (i<=0?trapped.length-1:i-1) : (i>=trapped.length-1?0:i+1);
        trapped[next].focus();
      }
    }
    cancel.addEventListener("click", close);
    save.addEventListener("click", submit);
    back.addEventListener("click", function(e){ if(e.target===back) close(); });   // click on the backdrop, not the box
    document.addEventListener("keydown", onKey);
    document.body.appendChild(back);
    ti.focus(); ti.select();
  }
  // The server's create op stores only the title, so persist an optional description entered
  // at create time with an immediate follow-up edit on the returned card id.
  function createTask(title, desc){
    fetch("/threads",{method:"POST",headers:headers({"Content-Type":"application/json"}),body:JSON.stringify({op:"create", title:title, by:me()})})
      .then(function(r){ return r.json(); })
      .then(function(j){ if(j&&j.error){ alert(j.error); load(); return; }
        // The description is a second request (the server's create op stores only the title) --
        // op() now surfaces both a {error} response AND a network failure here, so a dropped
        // description is never silent: the card exists, but the user finds out if the follow-up didn't land.
        if(desc && j && j.thread && j.thread.id) op({op:"edit", id:j.thread.id, desc:desc}); else load(); })
      .catch(function(){ alert("couldn't reach the server -- the task wasn't created, try again"); });
  }
  function render(){
    var root=$("#board"); root.innerHTML="";
    LANES.forEach(function(L){
      var col=document.createElement("div"); col.className="col";
      var items=cache.filter(function(t){ return t.status===L[0]; });
      var hidden=0;
      if(L[0]==="done"){   // age out of VIEW after 48h -- the ledger still holds them (search comes later)
        var cutoff=Date.now()/1000-DONE_SHOW_SECS, all=items;
        items=all.filter(function(t){ return (t.closed||t.updated||0)>=cutoff; });
        hidden=all.length-items.length;
      }
      var h=document.createElement("h2"); var hl=document.createElement("span"); hl.textContent=L[1]; h.appendChild(hl);
      var n=document.createElement("span"); n.className="n"; n.textContent=items.length+(hidden?"+"+hidden:""); h.appendChild(n); col.appendChild(h);
      var wrap=document.createElement("div"); wrap.className="cards";
      if(hidden){ var hnote=document.createElement("div"); hnote.className="empty";
        hnote.textContent=hidden+" older done card"+(hidden>1?"s":"")+" held in the ledger (not shown)"; wrap.appendChild(hnote); }
      if(!items.length){ var e=document.createElement("div"); e.className="empty"; e.textContent="—"; wrap.appendChild(e); }
      items.forEach(function(t){
        var c=document.createElement("div"); c.className="card "+t.status+(t.stale?" stale":"");
        var tt=document.createElement("div"); tt.className="t"; tt.textContent=t.title; c.appendChild(tt);
        if(t.desc){ var dd=document.createElement("div"); dd.className="sum"; dd.style.fontStyle="normal"; dd.textContent=t.desc; c.appendChild(dd); }
        var meta=document.createElement("div"); meta.className="meta";
        if(t.owner){ meta.appendChild(av(t.owner)); var w=document.createElement("span"); w.className="who"; w.textContent=t.owner; meta.appendChild(w); }
        (t.assignees||[]).forEach(function(a){ if(a!==t.owner) meta.appendChild(av(a)); });
        var age=document.createElement("span"); age.className="age";
        age.textContent=t.id+(t.status==="done" ? " · done "+fdate(t.closed||t.updated) : " · "+tage(t.updated));
        age.title="created "+fdate(t.created)+(t.closed ? " · closed "+fdate(t.closed) : "");   // exact dates on hover
        meta.appendChild(age);
        c.appendChild(meta);
        if(t.summary){ var s=document.createElement("div"); s.className="sum"; s.textContent=t.summary; c.appendChild(s); }
        if(t.status!=="done"){
          var b=document.createElement("div"); b.className="btns";
          var btn=function(label,fn){ var x=document.createElement("button"); x.textContent=label; x.addEventListener("click",fn); b.appendChild(x); };
          btn("✎", function(){
            openTaskDialog({ id:t.id, title:t.title, desc:t.desc||"", onSave:function(v){
              op({op:"edit", id:t.id, title:v.title, desc:v.desc}); } });
          });
          if(t.status==="backlog") btn("→ Open", function(){ op({op:"status", id:t.id, lane:"open"}); });
          if(t.status==="open"){ btn("Claim", function(){ op({op:"claim", id:t.id, agent:me()}); });
                                 btn("→ Backlog", function(){ op({op:"status", id:t.id, lane:"backlog"}); }); }
          if(t.stale) btn("Adopt", function(){ op({op:"claim", id:t.id, agent:me()}); });
          if(t.status==="claimed") btn("→ Review", function(){ op({op:"status", id:t.id, lane:"review"}); });
          if(t.status==="review") btn("← Working", function(){ op({op:"status", id:t.id, lane:"claimed"}); });
          btn("✓ Done", function(){ var s=prompt("One-line summary (optional):")||""; op({op:"close", id:t.id, summary:s}); });
          c.appendChild(b);
        }
        wrap.appendChild(c);
      });
      col.appendChild(wrap);
      root.appendChild(col);
    });
  }
  function load(){
    fetch("/threads",{headers:headers()}).then(function(r){ return r.status===200?r.json():null; })
      .then(function(j){ if(j&&j.threads){ cache=j.threads; render(); } })
      .catch(function(){});
  }
  $("#newtask").addEventListener("click", function(){
    openTaskDialog({ onSave:function(v){ createTask(v.title, v.desc); } });
  });
  // "Back" must not duplicate the chat: this tab is normally OPENED BY the chat page, so back =
  // close this tab (the original chat is still there). If /tasks was visited directly by URL,
  // browsers block self-close -- then (and only then) the fallback navigation to "/" is correct,
  // because no original tab exists.
  $("#backlink").addEventListener("click", function(e){
    e.preventDefault();
    window.close();
    setTimeout(function(){ location.href="/"; }, 200);  // only reached when close() was blocked
  });
  fetch("/health").then(function(r){return r.json();}).then(function(h){
    if(h && h.control) $("#newtask").style.display="";   // mutations are control-gated; hide the button when they'd 404
  }).catch(function(){});
  setInterval(load, 3000);
  load();
})();
</script>
</body>
</html>
